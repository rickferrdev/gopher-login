services:
    postgres:
        image: postgres:17-alpine
        container_name: postgres
        environment:
            - POSTGRES_USER=${GOPHER_POSTGRES_USER:?error}
            - POSTGRES_PASSWORD=${GOPHER_POSTGRES_PASSWORD:?error}
            - POSTGRES_DB=${GOPHER_POSTGRES_DB:?error}
        ports:
            - "5437:5437"
        volumes:
            - postgres-data:/var/lib/postgresql/data
        networks:
            - gopher-network
        command: ["postgres", "-p", "${GOPHER_POSTGRES_PORT:?error}"]
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -p ${GOPHER_POSTGRES_PORT:?error} -U postgres"]
            interval: 10s
            timeout: 5s
            retries: 5
        env_file:
            - path: ../.env
              required: true

    logbull:
        image: logbull/logbull:latest
        container_name: logbull
        ports:
            - "4005:4005"
        volumes:
            - ../.logbull-data:/logbull-data
        restart: unless-stopped
        networks:
            - gopher-network
        healthcheck:
            test:
                [
                    "CMD",
                    "curl",
                    "-f",
                    "http://localhost:4005/api/v1/system/health",
                ]
            interval: 10s
            timeout: 5s
            retries: 10

    gopher:
        build:
            context: ../.
            dockerfile: docker/Dockerfile
        container_name: gopher
        environment:
            - GOPHER_SERVER_PORT=${GOPHER_SERVER_PORT:?error}
            - GOPHER_SERVER_JWT_SECRET=${GOPHER_SERVER_JWT_SECRET}
            - GOPHER_POSTGRES_URL=${GOPHER_POSTGRES_URL:?error}
            - GOPHER_POSTGRES_USER=${GOPHER_POSTGRES_USER:?error}
            - GOPHER_POSTGRES_PASSWORD=${GOPHER_POSTGRES_PASSWORD?:error}
            - GOPHER_LOGBULL_PROJECT_ID=${GOPHER_LOGBULL_PROJECT_ID?:error}
            - GOPHER_LOGBULL_HOST=${GOPHER_LOGBULL_HOST:-http://logbull:4005}
            - GOPHER_POSTGRES_DB=${GOPHER_POSTGRES_DB:?error}
        ports:
            - "8080:8080"
        depends_on:
            - postgres
            - logbull
        networks:
            - gopher-network
        env_file:
            - path: ../.env
              required: true

networks:
    gopher-network:
        driver: bridge
        name: gopher-network

volumes:
    postgres-data:
        name: postgres-data
